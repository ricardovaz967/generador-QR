<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generador de QR</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Generador de QR</h1>

      <section class="card">
        <form id="qr-form" class="form" autocomplete="off">
          <label for="url-input">URL</label>
          <input
            id="url-input"
            name="url"
            type="url"
            inputmode="url"
            placeholder="https://ejemplo.com"
            required
          />

          <div class="row">
            <div class="field">
              <label for="format-select">Formato</label>
              <select id="format-select" name="format">
                <option value="png" selected>PNG</option>
                <option value="svg">SVG</option>
              </select>
            </div>

            <div class="field">
              <label for="size-select">Tamaño (px)</label>
              <select id="size-select" name="size">
                <option value="128">128</option>
                <option value="192">192</option>
                <option value="256" selected>256</option>
                <option value="384">384</option>
                <option value="512">512</option>
                <option value="768">768</option>
                <option value="1024">1024</option>
              </select>
            </div>
          </div>

          <button id="generate-btn" type="submit">Generar QR</button>
          <p id="status" class="status success" role="status" aria-live="polite">
            Aún no se ha generado ningún QR
          </p>
        </form>
      </section>

      <section class="card" aria-label="Resultado">
        <div class="result">
          <div class="preview">
            <img id="qr-img" alt="" style="display: none;" />
          </div>

          <div class="actions">
            <a id="download-link" class="btn secondary" href="#" download style="display: none;">
              Guardar imagen
            </a>
          </div>
        </div>
      </section>

      <footer class="hint">
        Consejo: usa el formato <strong>SVG</strong> para mantener calidad al escalar.
      </footer>
    </main>

    <script src="vendor/qrcode.bundle.js"></script>
    <script src="app.js"></script>
  </body>
</html>
